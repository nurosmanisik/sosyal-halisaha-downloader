name: tests

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests

      - name: Compile Python files
        run: python -m py_compile app.py downloader.py extractor.py finder.py jobs.py utils.py desktop_app.py

      - name: Check frontend JavaScript
        run: node --check static/app.js

      - name: Check launcher scripts
        run: |
          bash -n scripts/run_web.sh
          bash -n scripts/stop_web.sh
          bash -n scripts/make_macos_app.sh
          bash -n packaging/macos/build_app.sh

      - name: Run ruff
        run: python -m ruff check .
